<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Negozio di Animali</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Arial', sans-serif;
      background: url('https://www.repstatic.it/content/contenthub/img/2023/01/16/132908843-3880ffc4-bc0c-4cf2-9c3b-ea0da1f444fc.jpg') no-repeat center center fixed;
      background-size: cover;
      color: white;
      margin: 0;
      padding: 0;
      overflow-x: hidden;
      overflow-y: hidden;
    }

    header {
      margin-top: 10px;
      background-color: black;
      color: white;
      text-align: center;
      padding: 23;
    }

    section {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-around;
      padding: 2em;
    }

    .row {
      display: flex;
      justify-content: space-around;
      width: 100%;
    }

    .button-with-image {
      width: calc(33.33% - 2em);
      height: 200px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-end;
      border: 2px solid black;
      border-radius: 8px;
      margin: 1em;
      padding: 1em;
      font-weight: bold;
      color: white;
      font-size: 18px;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
      background-image: url('https://amicidicasa.it/wp-content/uploads/2022/12/animali-domestici-1024x473.jpeg');
      background-size: cover;
      background-position: center;
    }

    .button-with-image:hover {
      transform: scale(1.05);
      box-shadow: 0 8px 12px rgba(0, 0, 0, 0.2);
    }

    .button-with-image::after {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      border-radius: 8px;
    }

    .button-text {
      margin-top: 10px; /* Aggiunto margine sopra la scritta */
    }

    footer {
      background-color: #333;
      color: white;
      text-align: center;
      padding: 1em;
      position: fixed;
      bottom: 0;
      width: 100%;
      margin-top: auto;
      box-shadow: 0 -4px 6px rgba(0, 0, 0, 0.1);
    }
  </style>
</head>

<body>
  <header>
    <h1>Benvenuto nel Nostro Negozio di Animali</h1>
    <p>Tutto ciò di cui i tuoi amici pelosi hanno bisogno!</p>
  </header>

  <section>
    <div class="row">
      <div class="button-with-image" type="button" routerLink="products">
        <div class="button-text">Visualizza prodotti</div>
      </div>
    </div>
  </section>
  <br><br><br><br><br><br><br>
  Contattaci:         EcommerceGranata_email.it<br>
  Telefono fisso:     098498899<br>
  Solo urgenze:       333224400



</body>

</html>



<script>
  document.addEventListener('DOMContentLoaded', function () {
    var btnCani = document.getElementById('prodottiCani');
    btnCani.addEventListener('click', function () {
      var buttons = document.querySelectorAll('.button-with-image');
      buttons.forEach(function (button) {
        var category = button.getAttribute('data-category');
        if (category === 'Cani') {
          button.style.display = 'flex'; 
        } else {
          button.style.display = 'none';
        }
      });
    });
  });
</script>
