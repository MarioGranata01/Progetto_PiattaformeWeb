<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      font-family: 'Arial', sans-serif;
      margin: 0;
      padding: 0;
      background: url('https://www.repstatic.it/content/contenthub/img/2023/01/16/132908843-3880ffc4-bc0c-4cf2-9c3b-ea0da1f444fc.jpg') center center fixed;
      background-size: cover;
    }

    .container {
      max-width: 400px;
      position: relative;
      top: 200px;
      margin: 0 auto 20px;
      padding: 20px;
      border-radius: 8px;
      background: rgba(44, 44, 44, 0.8);
      color: white;
    }

    .form-group {
      margin-bottom: 15px;
      position: relative;
    }

    .form-control {
      width: calc(100% - 28px);
      box-sizing: border-box;
      background-color: rgba(255, 255, 255, 0.8);
      color: #000;
      padding: 8px;
      border: none;
      border-radius: 4px;
      display: inline-block;
      vertical-align: middle;
    }

    .btn-toggle {
      background-color: transparent;
      color: white;
      border: none;
      cursor: pointer;
      float: right; /* Posiziona il pulsante "nascondi" a destra */
      margin-top: -28px; /* Allinea il pulsante verticalmente al campo di input */
    }

    .btn-primary {
      width: 100%;
      box-sizing: border-box;
      background-color: #007bff;
      color: #fff;
      padding: 10px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }

    .btn-primary:hover {
      background-color: #0056b3;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1 class="display-5">Account</h1>
    <form (ngSubmit)="updateUser()">
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" class="form-control" id="email" [(ngModel)]="userDetails.email" name="email">
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input type="{{ passwordVisible ? 'text' : 'password' }}" class="form-control" id="password" [(ngModel)]="password" name="password" style="color: black;">
        <button class="btn btn-outline-secondary btn-sm btn-toggle" type="button" (click)="togglePasswordVisibility()">
          <i class="bi bi-eye{{ passwordVisible ? '-slash' : '' }}"></i>
        </button>
      </div>

      <div class="form-group">
        <label for="confirmPassword">Conferma password</label>
        <input type="{{ confirmPasswordVisible ? 'text' : 'password' }}" class="form-control" id="confirmPassword" [(ngModel)]="confirmPassword" name="confirmPassword" style="color: black;">
        <button class="btn btn-outline-secondary btn-sm btn-toggle" type="button" (click)="toggleConfirmPasswordVisibility()">
          <i class="bi bi-eye{{ confirmPasswordVisible ? '-slash' : '' }}"></i>
        </button>
      </div>

      <button type="submit" class="btn btn-primary">Aggiorna password</button>
    </form>
  </div>
</body>

</html>
